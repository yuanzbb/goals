<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Awesome Me</title>
  <style>
    body {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    }

    }

    }

    .col-op {

    }

    .col-date {
      width: 76px;
    }

    .date-field {
      position: relative;
      min-height: 1.6em;
      padding: 2px 4px;
      border-radius: 4px;
      cursor: pointer;
    }

    .date-field input[type="date"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
      padding: 0;
      opacity: 0;
      cursor: pointer;
    }

    .date-label {
      pointer-events: none;
    }

    .date-field:not(.has-value):hover,

      background: #f0f0f0;
    }

    .date-field:not(.has-value):focus-within .date-label::before {
      content: "选择日期";
      color: #bbb;
    }

    select {
      width: 92px;
      padding: 4px 6px;
    }

    .cell-edit {
      cursor: text;
      min-height: 1.4em;
    }

    .cell-edit:focus {
      outline: 2px solid #4a90d9;
      outline-offset: -2px;
      background: #f0f7ff;
    }

    .subgoal-cell {
      font-weight: 600;
    }

    .btn-desc {

      margin-top: 6px;
      font-size: 12px;
      padding: 2px 6px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #aaa;

    }

      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;

      padding: 10px;

    .desc-popover textarea {

      min-height: 110px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
    }

    .icon-btn {
      border: none;
      background: transparent;
      color: #c4c4c4;
      cursor: pointer;
      border-radius: 5px;
      line-height: 1;
      padding: 2px 6px;
      transition: color 0.12s, background 0.12s;

    .icon-btn:hover {
      background: #f0f0f0;
    }

    .add-plan {
      font-size: 15px;
    }

    .add-plan:hover {
      color: #555;
    }

    .del {
      font-size: 13px;
    }

    .del:hover {
      color: #c0392b;
      background: #fbeceb;
    }

    .add-subgoal-btn {

      background: transparent;
      color: #bbb;
      font-size: 13px;
      padding: 4px 4px;
      cursor: pointer;

      color: #555;
      background: #f0f0f0;
    }

      position: relative;
      display: inline-block;
    }

      border-radius: 6px;
      cursor: pointer;
      text-align: center;

      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;

    .status-wrap:hover::after,
    .status-wrap:focus-within::after {

      background: #fff;

    td.done {

      background: #fafafa;
    }

    td.done select {
      color: #aaa;
    }

    .status-icon {
      margin-right: 2px;
    }

      font-size: 20px;
      pointer-events: none;
      z-index: 9999;
      opacity: 1;
      transform: translate(0, 0);
      transition: transform 0.9s ease-out, opacity 0.9s ease-out;

    .encourage-label {

      pointer-events: none;

      padding: 14px 16px;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fcfcfc;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;

    .progress-label {
      font-weight: 700;
      color: #6b5bd1;
    }

    .progress-count {
      color: #2e9e4f;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .snail-track {
      position: relative;
      height: 28px;
      margin: 4px 6px;
    }

    .snail-path {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 6px;
      transform: translateY(-50%);
      background: #ececec;
      border-radius: 999px;
    }

    .snail-trail {
      position: absolute;
      left: 0;
      top: 50%;
      height: 6px;
      width: 0;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #d9f2d9, #86d486);
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(0.2, 0.7, 0.3, 1);
    }

    .snail-trail.full {
      background: linear-gradient(90deg, #ffe08a, #ffb300);
    }

    .snail {
      position: absolute;
      top: 50%;
      left: 0;
      font-size: 20px;
      transform: translate(-50%, -55%);
      transition: left 0.6s cubic-bezier(0.2, 0.7, 0.3, 1);
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.15));

    .snail-goal {
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);

    }

      font-size: 13px;

      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;

    function emptyPlan() {
      return { plan: "", end: "", metric: "", status: "待开始" };
    }

    function emptySubgoal() {
      return { subgoal: "", desc: "", plans: [emptyPlan()] };
    }

    let data = loadData();

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return migrate(JSON.parse(raw));
      } catch (e) {
        console.warn("读取本地数据失败，使用默认数据", e);
      }
      return structuredClone(defaultData);
    }

    function migrate(parsed) {
      Object.values(parsed).forEach((subgoals) => {
        (subgoals || []).forEach((sg) => {
          if (sg.desc === undefined) sg.desc = "";
          (sg.plans || []).forEach((p) => {
            if (p.end === undefined) p.end = "";
            p.end = toISO(p.end);
            delete p.time;
            delete p.start;
          });
        });
      });
      return parsed;
    }

    function toISO(value) {
      const s = String(value || "");
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      const md = s.match(/^(\d{1,2})-(\d{1,2})$/);
      if (md) {
        const y = new Date().getFullYear();
        const pad = (n) => String(n).padStart(2, "0");
        return y + "-" + pad(md[1]) + "-" + pad(md[2]);
      }
      return "";
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

      return fn();

    function updateProgress() {
      if (!progressEls) return;
      let total = 0;
      let done = 0;
      SECTIONS.forEach((s) => (data[s] || []).forEach((sg) => (sg.plans || []).forEach((p) => {
        total++;
        if (p.status === "已完成") done++;
      })));

      const ratio = total ? done / total : 0;
      const full = total > 0 && done === total;
      progressEls.count.textContent = done + " / " + total;
      progressEls.trail.style.width = (ratio * 100) + "%";
      progressEls.trail.classList.toggle("full", full);
      progressEls.snail.style.left = (ratio * 100) + "%";
      progressEls.snail.textContent = full ? "🏆" : "🐌";

      else if (ratio < 0.34) msg = "蜗牛动身啦，一点点往前爬～";
      else if (ratio < 0.67) msg = "爬过一半啦，稳稳的不着急。";
      else if (ratio < 1) msg = "终点就在前面，快到啦！";

      progressEls.msg.textContent = msg;

    function ensureFwCanvas() {
      if (fwCanvas) return;
      fwCanvas = document.createElement("canvas");
      fwCanvas.className = "fw-canvas";
      document.body.appendChild(fwCanvas);
      fwCtx = fwCanvas.getContext("2d");

      window.addEventListener("resize", sizeFwCanvas);

    function sizeFwCanvas() {
      if (!fwCanvas) return;
      fwCanvas.width = window.innerWidth;

    }

    function spawnBurst(x, y) {
      const hue = Math.floor(Math.random() * 360);
      const count = 48;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
        const speed = 2 + Math.random() * 4.5;
        fwParticles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 60 + Math.random() * 22,
          maxLife: 82,
          color: "hsl(" + (hue + Math.random() * 40 - 20) + ", 90%, 60%)"
        });
      }
    }

    function fireworksTick() {
      const w = fwCanvas.width;
      const h = fwCanvas.height;
      fwCtx.clearRect(0, 0, w, h);
      fwParticles.forEach((p) => {
        p.vy += 0.06;
        p.vx *= 0.985;
        p.vy *= 0.985;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
        fwCtx.globalAlpha = Math.max(0, p.life / p.maxLife);
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, 2.4, 0, Math.PI * 2);
        fwCtx.fillStyle = p.color;
        fwCtx.fill();
      });
      fwCtx.globalAlpha = 1;
      fwParticles = fwParticles.filter((p) => p.life > 0);
      if (fwParticles.length) {
        fwRaf = requestAnimationFrame(fireworksTick);
      } else {
        fwRaf = null;
        fwCtx.clearRect(0, 0, w, h);
      }
    }

    function makeEditable(value, onSave, extraClass) {
      const div = document.createElement("div");
      div.className = "cell-edit" + (extraClass ? " " + extraClass : "");
      div.contentEditable = "true";
      div.textContent = value || "";
      div.addEventListener("blur", () => onSave(div.textContent.trim()));
      return div;
    }

    function makeDatePicker(value, onSave) {
      const field = document.createElement("div");
      field.className = "date-field";

      const label = document.createElement("span");
      label.className = "date-label";

      const input = document.createElement("input");
      input.type = "date";
      input.value = value || "";

      function refresh() {
        const v = input.value;
        const iso = v.match(/^\d{4}-(\d{2})-(\d{2})$/);
        if (iso) {
          label.textContent = Number(iso[1]) + "月" + Number(iso[2]) + "日";
          field.classList.add("has-value");
        } else {
          label.textContent = "";
          field.classList.remove("has-value");
        }
      }
      refresh();

      input.addEventListener("change", () => { onSave(input.value); refresh(); });
      input.addEventListener("click", () => {
        if (typeof input.showPicker === "function") {
          try { input.showPicker(); } catch (e) { /* 忽略 */ }
        }
      });

      field.appendChild(label);
      field.appendChild(input);
      return field;
    }

            function refreshIcon() {
              if (p.status === "已完成") {
                if (!p.doneIcon) {
                  p.doneIcon = randomDoneIcon();
                  save();
                }
                statusIcon.textContent = p.doneIcon;
              } else if (p.status === "进行中") {
                statusIcon.textContent = "🌱";
              } else {
                statusIcon.textContent = "";
              }
            }

            function applyPlanDone() {
              const done = p.status === "已完成";
              const active = p.status === "进行中";
              planCells.forEach((c) => {
                c.classList.toggle("done", done);
                c.classList.toggle("active", active);
              });
            }

            select.addEventListener("change", () => {
              p.status = select.value;
              if (p.status === "已完成") {
                p.doneIcon = randomDoneIcon();
              } else {
                delete p.doneIcon;
              }
              save();
              applyPlanDone();
              refreshIcon();
              refreshSubgoalDone();
              updateProgress();
              refreshBanner();
              if (p.status === "已完成") celebrate(statusWrap);
              else if (p.status === "进行中") encourage(statusWrap);
            });
            const statusWrap = document.createElement("span");
            statusWrap.className = "status-wrap";
            statusWrap.appendChild(select);
            tdStatus.appendChild(statusIcon);
            tdStatus.appendChild(statusWrap);
            tr.appendChild(tdStatus);

            applyPlanDone();
            refreshIcon();

            const tdOp = document.createElement("td");
            tdOp.className = "col-op";

            const addPlanBtn = document.createElement("button");
            addPlanBtn.className = "icon-btn add-plan";
            addPlanBtn.type = "button";
            addPlanBtn.textContent = "＋";
            addPlanBtn.title = "在此行后添加行动计划";
            addPlanBtn.addEventListener("click", () => {
              sg.plans.splice(pi + 1, 0, emptyPlan());
              save();
              render();
            });
            tdOp.appendChild(addPlanBtn);

            const delBtn = document.createElement("button");
            delBtn.className = "icon-btn del";
            delBtn.type = "button";
            delBtn.textContent = "✕";
            delBtn.title = "删除这一行行动计划";
            delBtn.addEventListener("click", () => {
              sg.plans.splice(pi, 1);
              if (sg.plans.length === 0) subgoals.splice(si, 1);
              save();
              render();
            });
            tdOp.appendChild(delBtn);
            tr.appendChild(tdOp);

            table.appendChild(tr);
          });

          refreshSubgoalDone();
        });

        app.appendChild(table);

        const addSubBtn = document.createElement("button");
        addSubBtn.className = "add-subgoal-btn";
        addSubBtn.type = "button";
        addSubBtn.textContent = "＋ 添加主题";
        addSubBtn.addEventListener("click", () => {
          subgoals.push(emptySubgoal());
          save();
          render();
        });
        app.appendChild(addSubBtn);
      });

      app.appendChild(buildSummary());
      updateProgress();
    }

    let descPopover = null;
    let descAnchor = null;

    function closeDescPopover() {
      if (descPopover) {
        descPopover.remove();
        descPopover = null;
        descAnchor = null;
      }
    }

    function openDescPopover(anchor, sg) {
      if (descPopover && descAnchor === anchor) {
        closeDescPopover();
        return;
      }
      closeDescPopover();

      descAnchor = anchor;
      descPopover = document.createElement("div");
      descPopover.className = "desc-popover";

      const ta = document.createElement("textarea");
      ta.value = sg.desc || "";
      ta.placeholder = "在这里写这个目标的详细描述…";
      ta.addEventListener("input", () => {
        sg.desc = ta.value;
        save();
        anchor.classList.toggle("has-desc", ta.value.trim() !== "");
      });
      descPopover.appendChild(ta);
      descPopover.addEventListener("click", (e) => e.stopPropagation());

      document.body.appendChild(descPopover);

      const rect = anchor.getBoundingClientRect();
      const top = rect.bottom + window.scrollY + 6;
      let left = rect.left + window.scrollX;
      const maxLeft = window.scrollX + document.documentElement.clientWidth - descPopover.offsetWidth - 12;
      if (left > maxLeft) left = Math.max(window.scrollX + 12, maxLeft);
      descPopover.style.top = top + "px";
      descPopover.style.left = left + "px";

      ta.focus();
    }

    document.addEventListener("click", closeDescPopover);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeDescPopover();
    });

    render();
  </script>
</body>
</html>
